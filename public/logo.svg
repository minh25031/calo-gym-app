<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />
  <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Dumbbell -->
  <g transform="translate(100, 58)" stroke="white" stroke-width="5" stroke-linecap="round" fill="none">
    <!-- Bar -->
    <line x1="-32" y1="0" x2="32" y2="0" stroke-width="6"/>
    <!-- Left weight plates -->
    <rect x="-44" y="-16" width="10" height="32" rx="3" fill="white" stroke="none"/>
    <rect x="-54" y="-20" width="8" height="40" rx="2" fill="white" stroke="none"/>
    <!-- Right weight plates -->
    <rect x="34" y="-16" width="10" height="32" rx="3" fill="white" stroke="none"/>
    <rect x="46" y="-20" width="8" height="40" rx="2" fill="white" stroke="none"/>
  </g>

  <!-- Apple/Calorie icon below -->
  <g transform="translate(100, 132)">
    <!-- Apple body -->
    <path d="M-10,-3 C-12,2 -16,8 -14,14 C-12,18 -6,18 -2,16 C0,17 0,17 2,16 C6,18 12,18 14,14 C16,8 12,2 10,-3 C6,-5 4,-4 0,-2 C-4,-4 -6,-5 -10,-3Z" fill="white"/>
    <!-- Apple stem -->
    <path d="M0,-2 C0,-5 -1,-8 2,-10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <path d="M0,-3 C4,-6 8,-5 8,-2 C8,0 5,1 3,-1 C2,-2 0,-3 0,-3Z" fill="url(#accent)"/>
  </g>

  <!-- Calorie sparkle top-left -->
  <g transform="translate(155, 40)">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="url(#accent)"/>
  </g>

  <!-- Small dot -->
  <circle cx="155" cy="155" r="3" fill="rgba(255,255,255,0.3)"/>
</svg>
